name: resolverscheck

on:
  push:
    branches: [next, ci]
  pull_request:
    branches: [next, ci]
  workflow_dispatch:

jobs:
  resolverscheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: resolvers check
        run: .github/workflows/resolverscheck.sh
