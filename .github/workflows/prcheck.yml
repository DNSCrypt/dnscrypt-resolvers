name: prcheck

on:
  push:
    branches: [master, next, ci]
  pull_request:
    branches: [master, next, ci]
  workflow_dispatch:

jobs:
  prcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: new entries
        run: .github/workflows/prcheck.sh
